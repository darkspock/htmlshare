name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  precheck:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deploy_required: ${{ steps.compare.outputs.deploy_required }}
      target_hash: ${{ steps.hash.outputs.target_hash }}
    steps:
      - uses: actions/checkout@v4

      - id: hash
        name: Compute deploy hash
        run: |
          files="$(git ls-files .dockerignore Dockerfile go.mod go.sum package.json sqlc.yaml cmd internal web deploy docker-compose.yml | sort)"
          target_hash="$(printf '%s\n' "$files" | xargs sha256sum | sha256sum | cut -d ' ' -f1)"
          echo "target_hash=${target_hash}" >> "$GITHUB_OUTPUT"
          echo "Deploy hash: ${target_hash}"

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - id: compare
        name: Compare deployed hash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          TARGET_HASH: ${{ steps.hash.outputs.target_hash }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER="${DEPLOY_USER:-root}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${PORT} ${USER}@${DEPLOY_HOST}"
          current_hash="$($SSH "cat /opt/htmlshare/deploy.hash 2>/dev/null || true")"
          echo "Current deployed hash: ${current_hash:-none}"
          if [ "$current_hash" = "$TARGET_HASH" ]; then
            echo "deploy_required=false" >> "$GITHUB_OUTPUT"
            echo "Runtime files are unchanged. Skipping build and deploy."
          else
            echo "deploy_required=true" >> "$GITHUB_OUTPUT"
            echo "Runtime files changed. Build and deploy required."
          fi

  build:
    runs-on: ubuntu-latest
    needs: precheck
    if: needs.precheck.outputs.deploy_required == 'true'
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - precheck
      - build
    if: needs.precheck.outputs.deploy_required == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy image
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE: ${{ needs.build.outputs.image }}
          TARGET_HASH: ${{ needs.precheck.outputs.target_hash }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER="${DEPLOY_USER:-root}"
          GHCR_USER="${GHCR_READ_USER:-$GITHUB_ACTOR}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${PORT} ${USER}@${DEPLOY_HOST}"
          SCP="scp -i ~/.ssh/deploy_key -P ${PORT}"

          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            printf '%s' "$GHCR_READ_TOKEN" | $SSH "docker login ghcr.io -u '${GHCR_USER}' --password-stdin"
          fi

          $SCP deploy/docker-compose.prod.yml "${USER}@${DEPLOY_HOST}:/opt/htmlshare/docker-compose.yml"

          $SSH "set -e
            cd /opt/htmlshare
            printf '%s\n' 'HTMLSHARE_IMAGE=${IMAGE}' > /opt/htmlshare/image.env
            docker compose --env-file /opt/htmlshare/image.env -f /opt/htmlshare/docker-compose.yml pull app
            docker compose --env-file /opt/htmlshare/image.env -f /opt/htmlshare/docker-compose.yml up -d --remove-orphans
            printf '%s\n' '${TARGET_HASH}' > /opt/htmlshare/deploy.hash
            docker image prune -f
          "
