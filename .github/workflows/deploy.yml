name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy image
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER="${DEPLOY_USER:-root}"
          GHCR_USER="${GHCR_READ_USER:-$GITHUB_ACTOR}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${PORT} ${USER}@${DEPLOY_HOST}"

          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            printf '%s' "$GHCR_READ_TOKEN" | $SSH "docker login ghcr.io -u '${GHCR_USER}' --password-stdin"
          fi

          $SSH "set -e
            cd /opt/htmlshare
            printf '%s\n' 'HTMLSHARE_IMAGE=${IMAGE}' > /opt/htmlshare/image.env
            docker compose --env-file /opt/htmlshare/image.env -f /opt/htmlshare/docker-compose.yml pull app
            docker compose --env-file /opt/htmlshare/image.env -f /opt/htmlshare/docker-compose.yml up -d --remove-orphans
            docker image prune -f
          "
